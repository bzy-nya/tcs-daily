<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TCS Daily — 理论计算机科学日报" />
    <meta name="theme-color" content="#F5A9B8" />
    <title>TCS Daily</title>

    <meta property="og:title" content="TCS Daily — 理论计算机科学日报" />
    <meta property="og:description" content="每日精选理论计算机科学论文的深度解读" />
    <link rel="icon" type="image/x-icon" href="https://bzy.moe/asset/image/favicon.ico">

    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" integrity="sha384-GvrOXuhMATgEsSwCs4smul74iXGOixntILdUW9XmUC6+HX0sLNAK3q71HotJqlAn" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js" integrity="sha384-cpW21h6RZv/phavutF+AuVYrr+dA8xD9zs6FwLpaCct6O9ctzYFfFr4dgmgccOTx" crossorigin="anonymous"></script>

    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>

    <!-- Prism.js -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Pixel grid background -->
    <div class="bg-grid"></div>

    <!-- SVG icon sprites (inlined) -->
    <svg width="0" height="0" style="position:absolute">
        <defs>
            <!-- Pixel sun icon -->
            <symbol id="px-sun" viewBox="0 0 16 16">
                <g fill="currentColor" shape-rendering="crispEdges">
                    <rect x="6" y="6" width="4" height="4"/>
                    <rect x="7" y="0" width="2" height="2"/>
                    <rect x="7" y="14" width="2" height="2"/>
                    <rect x="0" y="7" width="2" height="2"/>
                    <rect x="14" y="7" width="2" height="2"/>
                    <rect x="2" y="2" width="2" height="2"/>
                    <rect x="12" y="2" width="2" height="2"/>
                    <rect x="2" y="12" width="2" height="2"/>
                    <rect x="12" y="12" width="2" height="2"/>
                </g>
            </symbol>
            <!-- Pixel moon icon -->
            <symbol id="px-moon" viewBox="0 0 16 16">
                <g fill="currentColor" shape-rendering="crispEdges">
                    <rect x="4" y="2" width="8" height="2"/>
                    <rect x="2" y="4" width="10" height="2"/>
                    <rect x="2" y="6" width="8" height="2"/>
                    <rect x="2" y="8" width="6" height="2"/>
                    <rect x="2" y="10" width="8" height="2"/>
                    <rect x="4" y="12" width="6" height="2"/>
                    <rect x="12" y="3" width="1" height="1"/>
                    <rect x="14" y="5" width="1" height="1"/>
                    <rect x="13" y="8" width="1" height="1"/>
                </g>
            </symbol>
            <!-- Pixel triangle (expand indicator) -->
            <symbol id="px-triangle" viewBox="0 0 12 12">
                <g fill="currentColor" shape-rendering="crispEdges">
                    <rect x="2" y="2" width="2" height="2"/>
                    <rect x="2" y="4" width="2" height="2"/>
                    <rect x="4" y="4" width="2" height="2"/>
                    <rect x="2" y="6" width="2" height="2"/>
                    <rect x="4" y="6" width="2" height="2"/>
                    <rect x="6" y="6" width="2" height="2"/>
                    <rect x="2" y="8" width="2" height="2"/>
                    <rect x="4" y="8" width="2" height="2"/>
                    <rect x="2" y="10" width="2" height="2"/>
                </g>
            </symbol>
        </defs>
    </svg>

    <!-- Top-right controls: index button + theme button -->
    <div class="top-controls">
        <a class="ctrl-btn" id="index-btn" href="#index" title="Index">index</a>
        <button class="ctrl-btn" id="theme-btn" title="Switch Theme">
            <svg class="icon small theme-icon" aria-hidden="true"><use href="#px-sun"/></svg>
        </button>
    </div>

    <!-- Main container -->
    <main class="container" id="container">
        <!-- Article view (default) -->
        <article class="article" id="article-view" style="display:none;">
            <header class="article-header" id="article-header">
                <!-- filled by JS: title, date, issue#, tags -->
            </header>
            <div class="article-body" id="article-body">
                <!-- rendered markdown -->
            </div>
        </article>

        <!-- Index view -->
        <div class="index" id="index-view" style="display:none;">
            <header class="index-header">
                <h1 class="index-title">TCS Daily</h1>
                <p class="index-subtitle">理论计算机科学日报</p>
            </header>
            <div class="index-tags" id="index-tags">
                <!-- tag filter pills -->
            </div>
            <div class="index-list" id="index-list">
                <!-- issue cards -->
            </div>
        </div>

        <!-- Loading state -->
        <div class="loading" id="loading">
            <div class="loading-text">loading...</div>
        </div>
    </main>

    <!-- Sidenote column (outside container, positioned absolutely on wide screens) -->
    <div class="sidenote-column" id="sidenote-column"></div>

    <footer class="footer" id="footer" style="display:none;">
        <span>TCS Daily · <a href="https://bzy.moe">bzy.moe</a></span>
    </footer>

    <script src="app.js"></script>
</body>
</html>
